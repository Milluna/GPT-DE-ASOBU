name: Materialize beautiful 3D v3 release

on:
  pull_request:
    branches: [source-direct-v1.2]
    paths:
      - release/v3.0/payload/**

permissions:
  contents: write

concurrency:
  group: aori-v3-materialize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  materialize:
    name: Reassemble, verify, and commit v3 source
    if: github.head_ref == 'agent/beautiful-3d-v3' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reassemble and verify payload
        shell: bash
        run: |
          set -euo pipefail
          cat release/v3.0/payload/part-* > "$RUNNER_TEMP/beautiful-v3.tar.xz.b64"
          printf '%s  %s\n' \
            '1787328c5195e8e3217bb77b769eadfeaaca8c4a8d2df15a477132725da9c1d1' \
            "$RUNNER_TEMP/beautiful-v3.tar.xz.b64" | sha256sum -c -
          base64 --decode "$RUNNER_TEMP/beautiful-v3.tar.xz.b64" \
            > "$RUNNER_TEMP/beautiful-v3.tar.xz"
          printf '%s  %s\n' \
            '268d1ed5d6866e0f1563b0de3649403360f4cb272541ceebefe93f9ded9a93c0' \
            "$RUNNER_TEMP/beautiful-v3.tar.xz" | sha256sum -c -
          tar -xJf "$RUNNER_TEMP/beautiful-v3.tar.xz" -C .

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install

      - name: Verify generated source
        env:
          AORI_BUILD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          bun run test
          bun run build:app

      - name: Replace transport payload with verified source
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          rm -rf release/v3.0/payload
          rm -f .github/beautiful-v3-trigger
          rm -f .github/workflows/apply-beautiful-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add beautiful live 3D characters and title preview"
          git push origin "HEAD:${HEAD_BRANCH}"
