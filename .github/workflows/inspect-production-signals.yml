name: Inspect production deployment signals

on:
  pull_request:
    branches: [source-direct-v1.2]
    paths:
      - .github/inspect-production-signals-trigger

permissions:
  contents: write
  deployments: read
  checks: read
  statuses: read
  actions: read
  pages: read

jobs:
  inspect:
    if: github.head_ref == 'agent/production-discovery-v2' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Collect sanitized GitHub deployment signals
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: 869bb98c0fbf1418a4330610801ad1f49e5a4c91
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          node --input-type=module <<'NODE'
          import { writeFileSync } from 'node:fs';
          const { GH_TOKEN: token, REPOSITORY: repo, TARGET_SHA: sha } = process.env;
          const headers = {
            accept: 'application/vnd.github+json',
            authorization: `Bearer ${token}`,
            'x-github-api-version': '2022-11-28',
            'user-agent': 'aori-room-signal-inspector/2',
          };
          async function get(path, allow404 = false) {
            const response = await fetch(`https://api.github.com${path}`, { headers });
            if (allow404 && response.status === 404) return null;
            if (!response.ok) throw new Error(`${response.status} ${path}: ${await response.text()}`);
            return response.json();
          }
          function urls(value, out = [], depth = 0) {
            if (depth > 10 || value == null) return out;
            if (typeof value === 'string') {
              for (const match of value.matchAll(/https:\/\/[^\s"'<>]+/g)) out.push(match[0]);
            } else if (Array.isArray(value)) {
              for (const item of value) urls(item, out, depth + 1);
            } else if (typeof value === 'object') {
              for (const item of Object.values(value)) urls(item, out, depth + 1);
            }
            return out;
          }
          const result = { targetSha: sha, recordedAt: new Date().toISOString() };
          const deployments = await get(`/repos/${repo}/deployments?sha=${sha}&per_page=100`);
          result.deployments = [];
          for (const deployment of deployments) {
            const statuses = await get(`/repos/${repo}/deployments/${deployment.id}/statuses?per_page=100`);
            result.deployments.push({
              id: deployment.id,
              ref: deployment.ref,
              sha: deployment.sha,
              task: deployment.task,
              environment: deployment.environment,
              payloadUrls: [...new Set(urls(deployment))],
              statuses: statuses.map((status) => ({
                state: status.state,
                environmentUrl: status.environment_url,
                targetUrl: status.target_url,
                description: status.description,
                urls: [...new Set(urls(status))],
              })),
            });
          }
          const checks = await get(`/repos/${repo}/commits/${sha}/check-runs?filter=latest&per_page=100`);
          result.checkRuns = [];
          for (const check of checks.check_runs ?? []) {
            const annotations = await get(`/repos/${repo}/check-runs/${check.id}/annotations?per_page=100`);
            result.checkRuns.push({
              id: check.id,
              externalId: check.external_id ?? null,
              name: check.name,
              app: check.app?.slug ?? check.app?.name ?? null,
              status: check.status,
              conclusion: check.conclusion,
              detailsUrl: check.details_url,
              startedAt: check.started_at,
              completedAt: check.completed_at,
              output: {
                title: check.output?.title ?? null,
                summary: check.output?.summary ?? null,
                text: check.output?.text ?? null,
                annotationsCount: check.output?.annotations_count ?? 0,
              },
              annotations: annotations.map((annotation) => ({
                path: annotation.path,
                startLine: annotation.start_line,
                endLine: annotation.end_line,
                level: annotation.annotation_level,
                message: annotation.message,
                title: annotation.title,
                rawDetails: annotation.raw_details,
                urls: [...new Set(urls(annotation))],
              })),
              urls: [...new Set(urls(check))],
            });
          }
          const statuses = await get(`/repos/${repo}/commits/${sha}/statuses?per_page=100`);
          result.statuses = statuses.map((status) => ({
            state: status.state,
            context: status.context,
            description: status.description,
            targetUrl: status.target_url,
            urls: [...new Set(urls(status))],
          }));
          const runs = await get(`/repos/${repo}/actions/runs?head_sha=${sha}&per_page=100`);
          result.workflowRuns = (runs.workflow_runs ?? []).map((run) => ({
            name: run.name,
            event: run.event,
            status: run.status,
            conclusion: run.conclusion,
            htmlUrl: run.html_url,
            headBranch: run.head_branch,
            headSha: run.head_sha,
            urls: [...new Set(urls(run))],
          }));
          const repository = await get(`/repos/${repo}`);
          result.repositoryHomepage = repository.homepage ?? null;
          const pages = await get(`/repos/${repo}/pages`, true);
          result.pages = pages ? { htmlUrl: pages.html_url, status: pages.status, source: pages.source } : null;
          result.allCandidateUrls = [...new Set(urls(result))];
          writeFileSync('output/signals.json', JSON.stringify(result, null, 2) + '\n');
          NODE

      - name: Check out evidence branch
        uses: actions/checkout@v4
        with:
          ref: production-evidence
          path: evidence
          fetch-depth: 0

      - name: Publish sanitized signals
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/production/beautiful-v3
          cp output/signals.json evidence/production/beautiful-v3/signals.json
          cd evidence
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add production/beautiful-v3/signals.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record production deployment signals"
          git push origin HEAD:production-evidence
